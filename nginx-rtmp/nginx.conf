load_module modules/ngx_rtmp_module.so;

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

# ============================================================
# RTMP BLOCK — Nhan stream tu Larix/OBS Mobile
# ============================================================
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        timeout 30s;

        application live {
            live on;
            record off;

            # Phase 0: Chua co API Node.js — on_publish bi comment
            # Phase 1: Uncomment de bat xac thuc stream key
            # on_publish http://api:3001/rtmp/on-publish;
            # on_publish_done http://api:3001/rtmp/on-publish-done;

            exec /bin/sh -c "echo PUBLISH_$name_at_\$(date) >> /tmp/hls/exec.log && nohup /usr/local/bin/transcode.sh $name > /dev/null 2>&1 &";
        }
    }
}

# ============================================================
# HTTP BLOCK — Serve HLS segments cho viewer
# ============================================================
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8088;
        server_name _;

        # HLS endpoint — viewer tro HLS.js vao day
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";

            if ($request_filename ~* \.m3u8$) {
                add_header Cache-Control no-cache;
                add_header Pragma no-cache;
                add_header Expires 0;
            }

            if ($request_filename ~* \.ts$) {
                add_header Cache-Control "max-age=600";
            }
        }

        # RTMP Stats — xem so luong viewer dang connect
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }

        # Health check endpoint
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
