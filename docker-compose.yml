services:
  nginx-rtmp:
    build:
      context: ./nginx-rtmp
      dockerfile: Dockerfile
    container_name: nginx-rtmp
    restart: always
    ports:
      - "1935:1935"
      - "127.0.0.1:8088:8088"
    volumes:
      - hls-temp:/tmp/hls
      - nginx-logs:/var/log/nginx
    labels:
      - traefik.enable=true
      - traefik.http.routers.hls.rule=Host(`live.mecwish.com`) && PathPrefix(`/hls`)
      - traefik.http.routers.hls.entrypoints=https
      - traefik.http.routers.hls.tls=true
      - traefik.http.routers.hls.tls.certresolver=letsencrypt
      - traefik.http.services.hls.loadbalancer.server.port=8088

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_HLS_URL=https://live.mecwish.com/hls/testkey.m3u8
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: frontend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`live.mecwish.com`)
      - traefik.http.routers.frontend.entrypoints=https
      - traefik.http.routers.frontend.tls=true
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.services.frontend.loadbalancer.server.port=3000

  # ============================================================
  # Monitoring — Uptime Kuma (status alerts) + Netdata (system metrics)
  # ============================================================
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: always
    ports:
      - "127.0.0.1:3002:3001"
    volumes:
      - uptime-kuma-data:/app/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.kuma.rule=Host(`status.mecwish.com`)
      - traefik.http.routers.kuma.entrypoints=https
      - traefik.http.routers.kuma.tls=true
      - traefik.http.routers.kuma.tls.certresolver=letsencrypt
      - traefik.http.services.kuma.loadbalancer.server.port=3001

  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    restart: always
    pid: host
    network_mode: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata-config:/etc/netdata
      - netdata-cache:/var/cache/netdata
      - netdata-lib:/var/lib/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
    environment:
      - NETDATA_LISTENER_PORT=19999

  # ============================================================
  # Auto-cleanup cron — ngăn "No space left on device"
  # ============================================================
  cleanup:
    image: alpine:3.21
    container_name: cleanup-cron
    restart: always
    volumes:
      - hls-temp:/tmp/hls
      - nginx-logs:/var/log/nginx
      - ./scripts/cleanup-hls.sh:/usr/local/bin/cleanup-hls.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '*/5 * * * * sh /usr/local/bin/cleanup-hls.sh' > /etc/crontabs/root
        crond -f -l 2

volumes:
  hls-temp:
  nginx-logs:
  uptime-kuma-data:
  netdata-config:
  netdata-cache:
  netdata-lib:
