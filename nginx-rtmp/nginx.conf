load_module modules/ngx_rtmp_module.so;

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

# ============================================================
# RTMP BLOCK — Nhan stream tu Larix/OBS Mobile
# ============================================================
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        timeout 30s;

        application live {
            live on;
            record off;

            # Phase 0: Chua co API Node.js — on_publish bi comment
            # Phase 1: Uncomment de bat xac thuc stream key
            # on_publish http://api:3001/rtmp/on-publish;
            # on_publish_done http://api:3001/rtmp/on-publish-done;

            exec ffmpeg -i rtmp://localhost/live/$name
                -c:v libx264
                -preset veryfast
                -tune zerolatency
                -sc_threshold 0
                -g 48
                -keyint_min 48
                -b:v 2500k
                -maxrate 2500k
                -bufsize 5000k
                -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2"
                -c:a aac
                -ar 44100
                -b:a 128k
                -f hls
                -hls_time 2
                -hls_list_size 6
                -hls_flags delete_segments+append_list
                -hls_segment_type mpegts
                -hls_segment_filename /tmp/hls/$name_%03d.ts
                /tmp/hls/$name.m3u8
                2>>/var/log/nginx/ffmpeg-$name.log;
        }
    }
}

# ============================================================
# HTTP BLOCK — Serve HLS segments cho viewer
# ============================================================
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8088;
        server_name _;

        # HLS endpoint — viewer tro HLS.js vao day
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";

            if ($request_filename ~* \.m3u8$) {
                add_header Cache-Control no-cache;
                add_header Pragma no-cache;
                add_header Expires 0;
            }

            if ($request_filename ~* \.ts$) {
                add_header Cache-Control "max-age=600";
            }
        }

        # RTMP Stats — xem so luong viewer dang connect
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }

        # Health check endpoint
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
